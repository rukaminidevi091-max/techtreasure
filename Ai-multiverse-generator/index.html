    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --light: #f5f6fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;

            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .main-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 900px) {
            .main-container {
                grid-template-columns: 160px 1fr 300px;
            }
        }

        /* Sidebar Advertisement Areas */
        .ad-sidebar-left {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .ad-sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Interactive App Interface */
        .app-card {
            background: white;

            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;

        h2 {

            margin-bottom: 10px;

        input, select, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }

        button:hover {
            background-color: #5b4cd1;
        }

        /* Loading / Progress Animation to increase Time-On-Site */
        .loader-container {
            display: none;

            padding: 20px;
        }

        .progress-bar {
            width: 100%;
            background-color: #eee;
            border-radius: 10px;
            overflow: hidden;

        }

        .progress-fill {
            width: 0%;
            height: 10px;
            background-color: var(--primary);

        }

        /* Results Section */

        /* Inline Banner Container */

            <h2>Enter Your Details</h2>
            
            <label for="userName">Your Name:</label>
            <input type="text" id="userName" placeholder="e.g., Alex Carter" required>

            <label for="dimension">Choose Reality/Genre:</label>
            <select id="dimension">
                <option value="Cyberpunk Neon City">Cyberpunk 2099 Neon City</option>

    <script>
        const stories = {
            "Cyberpunk Neon City": "is a notorious rogue Netrunner known in the neon underground as 'The Phantom Grid'. Pursued by Megacorporations, you just cracked a secure data-shard containing the location of the world's last offline server.",
            "Medieval Fantasy Kingdom": "is a legendary Spellsword chosen by the ancient dragons. Armed with an enchanted runeblade, you are currently on a quest to seal the Void Breach before the blood moon reaches its peak.",
            "Galactic Space Empire": "is the rogue Commander of the starship 'Nebula Horizon'. Having escaped an interstellar federation trap, your crew discovered a hyper-gate leading to an unexplored, rich galaxy.",
            "Post-Apocalyptic Wasteland": "is a master Scavenger and mechanic in the Rustlands. Riding a heavily modified interceptor vehicle, you possess the map to the last remaining clean water oasis on Earth."
        };

        function generateStory() {
            const nameInput = document.getElementById('userName').value.trim();
            if (!nameInput) {
                alert("Please enter a name to start the generation!");
                return;
            }

            const dimension = document.getElementById('dimension').value;
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const progressFill = document.getElementById('progressFill');
            const loadStatus = document.getElementById('loadStatus');
            const resultBox = document.getElementById('resultBox');

            // Setup display state
            btn.disabled = true;
            resultBox.style.display = "none";
            loader.style.display = "block";
            
            let progress = 0;
            const statusMessages = [
                "Scanning DNA across dimensions...",
                "Bypassing firewalls...",
                "Compiling reality fragments...",
                "Finalizing your alternate dossier..."
            ];

            // Artificial progress delay to give maximum exposure to banners & vignette initialization
            const interval = setInterval(() => {
                progress += 2;
                progressFill.style.width = progress + "%";

                if(progress === 25) loadStatus.innerText = statusMessages[1];
                if(progress === 50) loadStatus.innerText = statusMessages[2];
                if(progress === 75) loadStatus.innerText = statusMessages[3];

                if (progress >= 100) {
                    clearInterval(interval);
                    loader.style.display = "none";
                    
                    // Show final output
                    document.getElementById('storyOutput').innerText = `In the universe of "${dimension}", ${nameInput} ${stories[dimension]}`;
                    resultBox.style.display = "block";
                    btn.disabled = false;
                }
            }, 80); // ~4 seconds total wait time (perfect for keeping user attention)
        }

        function resetApp() {
            document.getElementById('userName').value = '';
            document.getElementById('resultBox').style.display = "none";
            document.getElementById('progressFill').style.width = "0%";
            document.getElementById('loadStatus').innerText = "Connecting to Multiverse Neural Network...";
        }
    </script>
