    padding:80px;

    font-size:16px;

   padding:20px;
}

/* Universal article container */
.article-body,
.article-content-inner{
    width:100%;
    max-width:100%;
    overflow-wrap:break-word;
}

/* Better typography */
.article-body p,
.article-body li,
.article-content-inner p,
.article-content-inner li{
    font-size:clamp(16px,1.2vw + 12px,19px);
    line-height:1.8;
}

/* Responsive headings */
h1{
   font-size:clamp(28px,5vw,48px);
}

h2{
   font-size:clamp(22px,4vw,34px);
}

h3{
   font-size:clamp(18px,3vw,26px);
}

/* Images */
img{
   max-width:100%;
   height:auto;
   display:block;
}

/* Tables fix */
table{
   display:block;
   overflow-x:auto;
   white-space:nowrap;
}

   padding:10px;

}

<script>

async function loadArticle() {

try {

const id = new URLSearchParams(window.location.search).get("id");

const res = await fetch("../posts.json");
const posts = await res.json();

const post = posts.find(x => x.id === id);

if (!post) {

document.getElementById("article").innerHTML =
"<h1>Article Not Found</h1>";

return;

}

const articleRes = await fetch(post.content);
const articleHtml = await articleRes.text();

document.title = post.title + " | Tech Treasure";

document.getElementById("article").innerHTML = `
<div class="article-box">

<img
class="article-image"
src="${post.image1}"
alt="${post.title}"
>

<div class="article-content">

<div class="article-category">
${post.category}
</div>

<h1 class="article-title">
${post.title}
</h1>

<div class="article-meta">
${post.date} • ${post.author}
</div>

<div class="article-body">
${articleHtml}
</div>

</div>

</div>
`;

} catch (err) {

console.error(err);

document.getElementById("article").innerHTML = `
<h2>Content Load Failed</h2>
<p>${err}</p>
`;

}

}

loadArticle();

</script>
