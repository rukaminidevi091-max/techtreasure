<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/navbar.css">

<style>

body{
    background:#f8fafc;
}

.article-wrap{
    max-width:900px;
    margin:10px auto;
    padding:10px 15px;
}
.article-box{
    background:white;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #e5e7eb;
}

.article-image{
    width:100%;
    max-height:500px;
    object-fit:contain;
}


.article-content{
    padding:0px;
}

.article-category{
    display:inline-block;
    background:#eff6ff;
    color:#2563eb;
    padding:6px 12px;
    border-radius:999px;
    margin-bottom:15px;
}

.article-title{
    font-size:40px;
    margin-bottom:10px;
}

.article-meta{
    color:#777;
    margin-bottom:25px;
}

.article-body{
    line-height:1.7;
    font-size:10px;
}

.article-body h2{
    margin-top:30px;
    margin-bottom:15px;
}

.article-body p{
    margin-bottom:18px;
}

.loading{
    text-align:center;
    padding:80px;
}

@media(max-width:768px){

.article-title{
    font-size:30px;
}

.article-body{
    font-size:16px;
}

}

</style>

</head>
<body>

<div id="navbar-container"></div>

<div class="article-wrap">

<div id="article">

<div class="loading">
Loading Article...
</div>
 <div class="sticky-ad">
            <script>
  atOptions = {
    'key' : '1968f0077a296f2b0346ba8b087f03d4',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/1968f0077a296f2b0346ba8b087f03d4/invoke.js"></script>

        </div>
</div>

</div>

<script src="/navbar.js"></script>
<script>

async function loadArticle() {

try {

const id = new URLSearchParams(window.location.search).get("id");

const res = await fetch("../posts.json");
const posts = await res.json();

const post = posts.find(x => x.id === id);

if (!post) {

document.getElementById("article").innerHTML =
"<h1>Article Not Found</h1>";

return;

}

const articleRes = await fetch(post.content);
const articleHtml = await articleRes.text();

document.title = post.title + " | Tech Treasure";

document.getElementById("article").innerHTML = `
<div class="article-box">

<img
class="article-image"
src="${post.image1}"
alt="${post.title}"
>

<div class="article-content">

<div class="article-category">
${post.category}
</div>

<h1 class="article-title">
${post.title}
</h1>

<div class="article-meta">
${post.date} • ${post.author}
</div>

<div class="article-body">
${articleHtml}
</div>

</div>

</div>
`;

} catch (err) {

console.error(err);

document.getElementById("article").innerHTML = `
<h2>Content Load Failed</h2>
<p>${err}</p>
`;

}

}

loadArticle();

</script>
<script src="/navbar.js"></script>
</body>
</html>
