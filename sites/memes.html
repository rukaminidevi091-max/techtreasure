
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funny Memes Collection | Tech Treasure</title>

<meta name="description" content="Browse funny memes, swipe through endless memes, and share with friends on WhatsApp and Telegram.">

<link rel="stylesheet" href="../style.css">

<style>

body{
    background:#f8fafc;
    margin:0;
}

.meme-container{
    max-width:800px;
    margin:30px auto;
    padding:15px;
}

.meme-card{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.meme-image{
    width:100%;
    max-height:650px;
    object-fit:contain;
    border-radius:15px;
    background:#f3f4f6;
}

#memeTitle{
    margin:15px 0;
    font-size:24px;
}

#memeCounter{
    color:#666;
    margin-bottom:20px;
}

.meme-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.meme-buttons button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2563eb;
    color:#fff;
    font-size:15px;
}

.loading{
    text-align:center;
    padding:50px;
    font-size:20px;
}

footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    background:#fff;
    border-top:1px solid #e5e7eb;
}

</style>
</head>
<body>

<header class="tt-navbar">

    <a href="/" class="tt-logo">
        Tech Treasure
    </a>

    <button class="tt-menu-btn" onclick="togggleMenu()">
        ☰
    </button>

    <nav id="tt-nav">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="tools.html">Tools</a>
        <a href="telegram.html">Telegram</a>
        <a href="memes.html">Memes</a>
        
    </nav>

<script>
function togggleMenu(){
    document
        .getElementById("tt-nav")
        .classList.toggle("active");
}
</script>

</header>

<div class="meme-container">

    <div class="meme-card">

        <img
            id="memeImg"
            class="meme-image"
            src=""
            alt="Meme"
        >

        <h2 id="memeTitle">
            Loading...
        </h2>

        <p id="memeCounter">
            Loading...
        </p>

        <div class="meme-buttons">

            <button onclick="prevMeme()">
                ⬅ Prev
            </button>

            <button onclick="shareMeme()">
                📤 Share
            </button>

            <button onclick="nextMeme()">
                Next ➡
            </button>

        </div>

    </div>

</div>

<footer>
  © 2026 Tech Treasure — Minimal tools for creators
</footer>

<script>

/*
CHANGE THIS ONLY IF SHEET NAME IS DIFFERENT
*/

const API_URL =
"https://opensheet.elk.sh/1ey16Hjvr6c3B3M44bMEp8qvd2sVtYx8_UUZ2M8KbCYQ/sheet1";

let memes = [];
let currentIndex = 0;

async function loadMemes(){

    try{

        const response =
        await fetch(API_URL);

        memes =
        await response.json();

        if(!memes.length){

            document.getElementById(
            "memeTitle"
            ).textContent =
            "No memes found";

            return;
        }

        shuffleMemes();

        showMeme();

    }catch(err){

        console.error(err);

        document.getElementById(
        "memeTitle"
        ).textContent =
        "Failed to load memes";
    }
}

function shuffleMemes(){

    memes.sort(() =>
        Math.random() - 0.5
    );
}

function showMeme(){

    const meme =
    memes[currentIndex];

    document.getElementById(
    "memeImg"
    ).src =
    meme.URL;

    document.getElementById(
    "memeTitle"
    ).textContent =
    meme.Name || "Funny Meme";

    document.getElementById(
    "memeCounter"
    ).textContent =
    (currentIndex + 1) +
    " / " +
    memes.length;

}

function nextMeme(){

    currentIndex++;

    if(currentIndex >= memes.length){

        currentIndex = 0;
    }

    showMeme();
}

function prevMeme(){

    currentIndex--;

    if(currentIndex < 0){

        currentIndex =
        memes.length - 1;
    }

    showMeme();
}

function shareMeme(){

    const meme =
    memes[currentIndex];

    const text =
    "😂 " +
    (meme.Name || "Funny Meme") +
    "\n\n" +
    window.location.href;

    if(navigator.share){

        navigator.share({
            title:meme.Name,
            text:text
        });

    }else{

        window.open(
            "https://wa.me/?text=" +
            encodeURIComponent(text)
        );
    }
}

/* Swipe Support */

let startX = 0;

document.addEventListener(
"touchstart",
e => {

    startX =
    e.touches[0].clientX;
}
);

document.addEventListener(
"touchend",
e => {

    let endX =
    e.changedTouches[0].clientX;

    if(startX - endX > 50){

        nextMeme();
    }

    if(endX - startX > 50){

        prevMeme();
    }

}
);

loadMemes();

</script>

</body>
</html>
