<body>

<div class="yt-tool">
  <h2>YouTube Thumbnail Downloader</h2>

  <div class="input-box">
    <input type="text" id="ytUrl" placeholder="Paste YouTube link here...">
    <button onclick="getThumbs()">Get Thumbnails</button>
  </div>

  <div id="thumbs" class="grid"></div>
</div>

<script>

// Extract YouTube ID
function getId(url){
  const reg = /(?:youtube\.com\/.*[?&]v=|youtu\.be\/|youtube\.com\/shorts\/)([^&?/]+)/;
  return url.match(reg)?.[1];
}

// Reliable download
async function downloadImage(url, filename) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();

    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(blobUrl);
  } catch (err) {
    alert("❌ Download blocked by browser. Try right click → save image.");
  }
}

// Generate thumbnails
function getThumbs(){
  const input = document.getElementById("ytUrl").value.trim();
  const id = getId(input);

  if(!id){
    alert("❌ Invalid YouTube URL");
    return;
  }

  const qualities = [
    {q:"Max HD",f:"maxresdefault.jpg"},
    {q:"HD",f:"hqdefault.jpg"},
    {q:"Medium",f:"mqdefault.jpg"},
    {q:"Low",f:"default.jpg"}
  ];

  const box = document.getElementById("thumbs");
  box.innerHTML = "";

  qualities.forEach(q=>{
    const url = `https://img.youtube.com/vi/${id}/${q.f}`;
    const safeName = `${id}_${q.q.replace(/\s+/g,'_')}.jpg`;

    const card = `
      <div class="card">
        <p>${q.q}</p>
        <img src="${url}" onerror="this.style.display='none'">
        <button onclick="downloadImage('${url}','${safeName}')">
          Download
        </button>
      </div>
    `;

    box.innerHTML += card;
  });
}
document.getElementById("ytUrl").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault(); // form submit ya reload na ho
    getThumbs();
  }
});
</script>

</body>

<!-- IMAGE CONVERTER PRO -->
<div class="img-tool">

  <h2>Image Converter</h2>

  <div id="drop" class="drop">
    Drag & Drop or Click
    <input type="file" id="file" accept="image/*" hidden>
  </div>

  <div class="controls">
    <select id="format">
      <option value="image/png">PNG</option>
      <option value="image/jpeg">JPG</option>
      <option value="image/webp">WEBP</option>
    </select>

    <input type="range" id="quality" min="0.5" max="1" step="0.1" value="1">
    <span id="qv">100%</span>

    <button onclick="convert()">Convert</button>
  </div>

  <div id="output"></div>

</div>

<style>
.img-tool{max-width:800px;margin:40px auto;text-align:center;font-family:sans-serif}
.drop{border:2px dashed #aaa;padding:40px;border-radius:10px;cursor:pointer;margin-bottom:20px}
.controls{margin-bottom:20px}
.controls select,.controls button{padding:10px;margin:5px}
#output img{max-width:100%;margin-top:10px;border-radius:10px}
</style>

<script>
let file;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

// drag
drop.onclick=()=>input.click();

input.onchange=e=>{
  file=e.target.files[0];
  preview(file);
};

drop.ondragover=e=>{
  e.preventDefault();
  drop.style.borderColor="red";
};

drop.ondrop=e=>{
  e.preventDefault();
  file=e.dataTransfer.files[0];
  preview(file);
};

function preview(f){
  const r=new FileReader();
  r.onload=()=>{
    document.getElementById("output").innerHTML=`<img src="${r.result}">`;
  };
  r.readAsDataURL(f);
}

// quality display
const q=document.getElementById("quality");
q.oninput=()=>document.getElementById("qv").innerText=Math.round(q.value*100)+"%";

// convert
function convert(){
  if(!file){alert("Upload image");return;}

  const format=document.getElementById("format").value;
  const quality=parseFloat(q.value);

  const img=new Image();
  const reader=new FileReader();

  reader.onload=e=>img.src=e.target.result;

  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=img.width;
    canvas.height=img.height;

    const ctx=canvas.getContext("2d");
    ctx.drawImage(img,0,0);

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);

      document.getElementById("output").innerHTML=`
        <img src="${url}">
        <br>
        <button onclick="download('${url}')">Download</button>
      `;
    },format,quality);
  };

  reader.readAsDataURL(file);
}

// download
function download(url){
  const a=document.createElement("a");
  a.href=url;
  a.download="converted";
  a.click();
}
</script>
