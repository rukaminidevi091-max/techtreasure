<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Articles | Tech Treasure</title>

<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/navbar.css">

<style>

body{
    background:#f8fafc;
}

.posts-wrap{
    max-width:1200px;
    margin:auto;
    padding:30px 15px;
}

.posts-title{
    text-align:center;
    font-size:36px;
    margin-bottom:30px;
}

.posts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.post-card{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:18px;
    overflow:hidden;
    transition:.25s;
}

.post-card:hover{
    transform:translateY(-4px);
}

.post-image{
    width:100%;
    height:220px;
    object-fit:contain;
}

.post-content{
    padding:18px;
}

.post-category{
    display:inline-block;
    padding:5px 10px;
    background:#eff6ff;
    color:#2563eb;
    border-radius:999px;
    font-size:12px;
    margin-bottom:10px;
}

.post-title{
    font-size:22px;
    margin-bottom:10px;
}

.post-desc{
    color:#666;
    line-height:1.6;
    margin-bottom:15px;
}

.post-meta{
    font-size:13px;
    color:#999;
    margin-bottom:15px;
}

.read-btn{
    display:inline-block;
    padding:10px 15px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.loading{
    text-align:center;
    padding:50px;
}
/* ARTICLE CARD */

.article-card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
    transition:0.3s ease;
    max-width:350px;
    width:100%;
    margin:auto;
}

.article-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card-link{
    text-decoration:none;
    color:inherit;
    display:block;
}

.card-image{
    aspect-ratio:2/3;
    overflow:hidden;
}

.card-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:0.4s ease;
}

.article-card:hover .card-image img{
    transform:scale(1.05);
}

.card-content{
    padding:18px;
}

.card-category{
    display:inline-block;
    background:#f3f4f6;
    color:#444;
    font-size:12px;
    font-weight:600;
    padding:6px 10px;
    border-radius:20px;
    margin-bottom:12px;
}

.card-content h3{
    font-size:1.2rem;
    line-height:1.4;
    margin-bottom:10px;
    color:#111827;
}

.card-content p{
    color:#555;
    font-size:0.95rem;
    line-height:1.6;
    margin-bottom:15px;
}

.card-footer{
    font-weight:600;
    color:#2563eb;
}

/* GRID */

.article-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:24px;
    max-width:90%;
    margin:auto;
    padding:20px;
}

/* MOBILE */

@media(max-width:768px){

    .card-content h3{
        font-size:1.1rem;
    }

    .card-content p{
        font-size:0.9rem;
    }

}
/* SEARCH */

.search-box{
    max-width:700px;
    margin:0 auto 25px;
}

.search-box input{
    width:100%;
    padding:16px 20px;
    border:1px solid #dbe1ea;
    border-radius:14px;
    font-size:16px;
    outline:none;
}

.search-box input:focus{
    border-color:#2563eb;
}

/* FILTERS */

.category-filters{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
}

.filter-btn{
    border:none;
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    background:#fff;
    border:1px solid #dbe1ea;
    transition:.25s;
}

.filter-btn:hover{
    background:#2563eb;
    color:#fff;
}

.filter-btn.active{
    background:#2563eb;
    color:white;
}

/* ARTICLE GRID */

.article-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:24px;
}

/* CARD */

.article-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.article-card:hover{
    transform:translateY(-5px);
}

.card-image{
    width:100%;
    height:220px;
}

.card-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-content{
    padding:18px;
}

.card-category{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:#eff6ff;
    color:#2563eb;
    font-size:12px;
    font-weight:600;
    margin-bottom:10px;
}

.card-content h3{
    margin-bottom:10px;
    font-size:20px;
    color:#111827;
}

.card-content p{
    color:#666;
    line-height:1.6;
    margin-bottom:15px;
}

.card-footer{
    color:#2563eb;
    font-weight:600;
}
</style>

</head>
<body><div class="posts-wrap">

    <h1 class="posts-title">Explore Articles</h1>

    <!-- Search -->

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search articles..."
        >
    </div>

    <!-- Categories -->

    <div class="category-filters">

        <button class="filter-btn active" data-category="all">
            All
        </button>

        <button class="filter-btn" data-category="Movies">
            Movies
        </button>

        <button class="filter-btn" data-category="Technology">
            Technology
        </button>

        <button class="filter-btn" data-category="AI">
            AI
        </button>

        <button class="filter-btn" data-category="Guides">
            Guides
        </button>

        <button class="filter-btn" data-category="Earn Money">
            Earn Money
        </button>

    </div>

    <div id="postsGrid" class="article-grid">

        <div class="loading">
            Loading Articles...
        </div>

    </div>

</div>

<script src="/navbar.js"></script>

<script>


let allPosts = [];
let currentCategory = "all";

async function loadPosts(){

    const res = await fetch("./posts.json");
    allPosts = await res.json();

    renderPosts(allPosts);

}

function renderPosts(posts){

    const grid = document.getElementById("postsGrid");

    if(posts.length === 0){

        grid.innerHTML = `
        <div class="loading">
            No articles found.
        </div>
        `;

        return;
    }

    grid.innerHTML = "";

    posts.reverse().forEach(post=>{

        grid.innerHTML += `

        <div class="article-card">

            <a href="${post.url}"
               class="card-link">

                <div class="card-image">
                    <img src="${post.image}"
                         alt="${post.title}"
                         loading="lazy">
                </div>

                <div class="card-content">

                    <span class="card-category">
                        ${post.category}
                    </span>

                    <h3>${post.title}</h3>

                    <p>${post.description}</p>

                    <div class="card-footer">
                        Read Article →
                    </div>

                </div>

            </a>

        </div>

        `;
    });

}

document.addEventListener("input",(e)=>{

    if(e.target.id !== "searchInput") return;

    const search = e.target.value.toLowerCase();

    let filtered = allPosts.filter(post=>{

        const matchesSearch =
            post.title.toLowerCase().includes(search) ||
            post.description.toLowerCase().includes(search);

        const matchesCategory =
            currentCategory === "all" ||
            post.category === currentCategory;

        return matchesSearch && matchesCategory;

    });

    renderPosts(filtered);

});

document.querySelectorAll(".filter-btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".filter-btn")
        .forEach(b=>b.classList.remove("active"));

        btn.classList.add("active");

        currentCategory = btn.dataset.category;

        const search =
            document
            .getElementById("searchInput")
            .value
            .toLowerCase();

        const filtered = allPosts.filter(post=>{

            const matchesSearch =
                post.title.toLowerCase().includes(search) ||
                post.description.toLowerCase().includes(search);

            const matchesCategory =
                currentCategory === "all" ||
                post.category === currentCategory;

            return matchesSearch && matchesCategory;

        });

        renderPosts(filtered);

    });

});

loadPosts();

</script>

<script src="/navbar.js"></script>
</body>
</html>
