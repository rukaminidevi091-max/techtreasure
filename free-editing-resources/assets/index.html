<!DOCTYPE html>
<html lang="en">
<head>
		<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
		<script type="text/javascript" src="app.js"></script>
		<link rel="stylesheet" href="app.css" type="text/css" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="All In One Video Downloader">
<meta name="keywords" content="video downloader,tiktok,instagram,youtube">
<meta name="robots" content="index,follow">
<title>All In One Video Downloader</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
padding:20px;
color:#222;
}
.container{max-width:900px;margin:auto}
.card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:20px;
animation:fade .3s ease;
}
h1{text-align:center;margin-bottom:10px}
p{text-align:center;color:#666}
.input-wrap{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
input{
flex:1;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
}
button{
padding:14px 16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:#fff;
}
button:hover{opacity:.9}
.actions{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}
.hidden{display:none}
.loader{
width:50px;height:50px;
border:5px solid #ddd;
border-top:5px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}
.error{
background:#fee2e2;
color:#b91c1c;
padding:12px;
border-radius:10px;
}
.thumb{
width:100%;
border-radius:12px;
margin-bottom:15px;
}
.info p{text-align:left;margin:5px 0}
.downloads a{
display:block;
margin-top:10px;
text-decoration:none;
background:#10b981;
padding:12px;
border-radius:10px;
color:#fff;
}
.history-item{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}
@keyframes spin{100%{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
	<!-- Google Analytics -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-WRD4WEN56V"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){ dataLayer.push(arguments); }
		gtag('js', new Date());
		gtag('config', 'G-WRD4WEN56V');
	</script>
</head>
<body>

<div class="container">

<div class="card">
<h1>All In One Video Downloader</h1>
<p>Download videos from multiple platforms instantly.</p>

<div class="input-wrap">
<input id="url" placeholder="Paste video URL">
<button id="downloadBtn">Download</button>
</div>

<div class="actions">
<button id="pasteBtn">Paste</button>
<button id="copyBtn">Copy URL</button>
<button id="clearBtn">Clear</button>
</div>
</div>

<div id="loading" class="card hidden">
<div class="loader"></div>
<p id="status">Fetching video...</p>
</div>

<div id="error" class="card hidden"></div>

<div id="result" class="card hidden"></div>

<div class="card">
<h3>Download History</h3>
<div id="history"></div>
</div>

</div>

<script>
const urlInput=document.getElementById("url");
const loading=document.getElementById("loading");
const errorBox=document.getElementById("error");
const result=document.getElementById("result");
const historyBox=document.getElementById("history");

function showError(msg){
errorBox.classList.remove("hidden");
errorBox.className="card error";
errorBox.textContent=msg;
}

function hideError(){
errorBox.className="card hidden";
}

function saveHistory(url){
const data=JSON.parse(localStorage.getItem("history")||"[]");
data.unshift(url);
localStorage.setItem("history",JSON.stringify(data.slice(0,20)));
renderHistory();
}

function renderHistory(){
const data=JSON.parse(localStorage.getItem("history")||"[]");
historyBox.innerHTML=data.map(v=>`<div class="history-item">${v}</div>`).join("");
}

document.getElementById("pasteBtn").onclick=async()=>{
try{
urlInput.value=await navigator.clipboard.readText();
}catch{}
};

document.getElementById("copyBtn").onclick=()=>{
navigator.clipboard.writeText(urlInput.value);
};

document.getElementById("clearBtn").onclick=()=>{
urlInput.value="";
result.classList.add("hidden");
hideError();
};

document.getElementById("downloadBtn").onclick=async()=>{
hideError();

const url=urlInput.value.trim();

if(!url) return showError("Please enter a URL.");

loading.classList.remove("hidden");
result.classList.add("hidden");

try{
const res=await fetch("/download",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url})
});

const data=await res.json();

if(!data.success) throw new Error(data.message||"Failed");

loading.classList.add("hidden");

result.innerHTML=`
<img class="thumb" src="${data.thumbnail||''}">
<div class="info">
<p><b>Title:</b> ${data.title||'Unknown'}</p>
<p><b>Author:</b> ${data.author||'Unknown'}</p>
<p><b>Platform:</b> ${data.platform||'Unknown'}</p>
<p><b>Duration:</b> ${data.duration||'Unknown'}</p>
</div>
<div class="downloads">
${(data.downloads||[]).map(d=>`
<a href="${d.url}" target="_blank">
Download ${d.quality}
</a>`).join("")}
</div>
`;

result.classList.remove("hidden");
saveHistory(url);

}catch(err){
loading.classList.add("hidden");
showError(err.message);
}
};

renderHistory();
</script>

</body>
</html>
