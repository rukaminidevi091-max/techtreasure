<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete pdfs pages</title>
   <link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0F172A">
   
    <link rel="stylesheet" href="/navbar.css">
</head>
<body>
    <div id="navbar-container"></div>


<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --accent:#4f7ef8;
  --good:#16a34a;
  --bad:#dc2626;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  padding:24px;
}

.container{max-width:900px;margin:auto;}

h1{font-size:26px;font-weight:700;}
p{color:var(--muted);margin-top:6px;}

.badges{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.badge{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:#fff;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-top:12px;
}

.drop{
  border:2px dashed var(--border);
  padding:28px;
  text-align:center;
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
}
.drop.drag{border-color:var(--accent);background:#eef2ff;}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:700px){.row{grid-template-columns:1fr;}}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.primary{background:var(--accent);color:#fff;}
.primary:hover{transform:scale(1.01);}

.secondary{
  background:#fff;
  border:1px solid var(--good);
  color:var(--good);
  display:none;
}

.preview{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:10px;
  margin-top:10px;
}

.page{
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
  background:#fff;
  transition:.2s;
}
.page:hover{border-color:var(--accent);}
.page.selected{background:#fee2e2;border-color:var(--bad);color:var(--bad);}

.status{margin-top:10px;font-size:13px;color:var(--muted);}

.progress{height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;display:none;margin-top:10px;}
.bar{height:100%;width:0%;background:var(--accent);transition:.2s;}
</style>

<div class="container">

  <h1>PDF Page Remover</h1>
  <p>Select pages visually or enter page numbers to delete instantly in your browser.</p>

  <div class="badges">
    <div class="badge">Free</div>
    <div class="badge">Secure (Browser Only)</div>
    <div class="badge">No Upload</div>
    <div class="badge">No Login</div>
  </div>

  <div class="card drop" id="drop">
    Drop PDF or Click to Upload
    <input type="file" id="file" hidden accept="application/pdf">
    <div id="info" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
  </div>

  <div class="card">
    <input id="manual" placeholder="Enter pages to delete (e.g. 1,3,5)">
  </div>

  <div class="card">
    <button class="primary" id="process" disabled>Load & Preview Pages</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div id="preview" class="preview"></div>
  </div>

  <div class="card">
    <button class="primary" id="removeBtn" style="display:none">Delete Selected Pages</button>
    <div class="progress" id="prog"><div class="bar" id="bar"></div></div>
    <button class="secondary" id="download">Download PDF</button>
  </div>

</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
let pdfBytes=null;
let fileName="";
let selected=new Set();
let output=null;

const drop=document.getElementById("drop");
const file=document.getElementById("file");
const process=document.getElementById("process");
const preview=document.getElementById("preview");
const status=document.getElementById("status");
const removeBtn=document.getElementById("removeBtn");
const download=document.getElementById("download");
const bar=document.getElementById("bar");
const prog=document.getElementById("prog");

drop.onclick=()=>file.click();

drop.ondragover=e=>{
e.preventDefault();
drop.classList.add("drag");
};

drop.ondragleave=()=>drop.classList.remove("drag");

drop.ondrop=e=>{
e.preventDefault();
drop.classList.remove("drag");
handle(e.dataTransfer.files[0]);
};

file.onchange=e=>handle(e.target.files[0]);

function handle(f){
if(!f||!f.type.includes("pdf")){
status.textContent="Invalid PDF";
return;
}

fileName=f.name;

const r=new FileReader();
r.onload=async e=>{
pdfBytes=new Uint8Array(e.target.result);
const doc=await PDFLib.PDFDocument.load(pdfBytes);
const pages=doc.getPageCount();

status.textContent=`Loaded ${pages} pages`;
process.disabled=false;
};
r.readAsArrayBuffer(f);
}

function renderPreview(count){
preview.innerHTML="";
selected.clear();

for(let i=1;i<=count;i++){
const d=document.createElement("div");
d.className="page";
d.textContent=i;

d.onclick=()=>{
if(selected.has(i)){
selected.delete(i);
d.classList.remove("selected");
}else{
selected.add(i);
d.classList.add("selected");
}
};

preview.appendChild(d);
}
}

function parseManual(){
return new Set(
(document.getElementById("manual").value||"")
.split(",")
.map(x=>parseInt(x.trim()))
.filter(x=>!isNaN(x))
);
}

process.onclick=async()=>{
const doc=await PDFLib.PDFDocument.load(pdfBytes);
const pages=doc.getPageCount();

renderPreview(pages);
removeBtn.style.display="block";
status.textContent="Click pages or use manual input";
};

removeBtn.onclick=async()=>{

const {PDFDocument}=PDFLib;
const doc=await PDFDocument.load(pdfBytes);

const manual=parseManual();
manual.forEach(x=>selected.add(x));

const pages=doc.getPages();
const total=pages.length;

const newDoc=await PDFDocument.create();

for(let i=0;i<total;i++){
const pageNo=i+1;
if(selected.has(pageNo)) continue;

const [copied]=await newDoc.copyPages(doc,[i]);
newDoc.addPage(copied);
}

prog.style.display="block";

let step=0;
const interval=setInterval(()=>{
step+=20;
bar.style.width=Math.min(step,100)+"%";
if(step>=100) clearInterval(interval);
},100);

output=await newDoc.save();

download.style.display="block";
status.textContent="Done! Ready to download";
};

download.onclick=()=>{
const blob=new Blob([output],{type:"application/pdf"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download=fileName.replace(".pdf","")+"_edited.pdf";
a.click();

URL.revokeObjectURL(url);
};
</script>
    
    <script src="/navbar.js"></script>
</body>
</html>
