<!-- POPUP AD -->

<script>
atOptions = {

<button onclick="closeReward()">
Continue
</button>

</div>

<script>

const data=[

{
q:"Capital of India?",
a:["Delhi","Patna","Mumbai","Lucknow"],
c:0
},

{
q:"2+5=?",
a:["7","6","8","5"],
c:0
},

{
q:"HTML stands for?",
a:[
"Hyper Text Markup Language",
"Home Tool",
"Hyper Tech",
"None"
],
c:0
}

];

let sc=0;
let st=0;
let prog=0;

function load(){

let r=data[
Math.floor(
Math.random()*data.length
)];

question.innerText=r.q;

answers.innerHTML="";

r.a.forEach((x,i)=>{

let b=document.createElement("button");

b.innerText=x;

b.onclick=()=>{

if(i===r.c){

sc++;
st++;

}else{

st=0;

}

prog+=12;

score.innerText=sc;

streak.innerText=st;

fill.style.width=
Math.min(prog,100)+"%";

if(st && st%5===0){

reward.style.display="flex";

}

load();

};

answers.appendChild(b);

});

}

function closeReward(){

reward.style.display="none";

}

load();

</script>
